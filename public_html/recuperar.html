<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - MiaTech</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;min-height:100vh;align-items:center;justify-content:center;margin:0}
    .card{background:#1e293b;padding:2rem;border-radius:14px;width:min(420px,92vw);box-shadow:0 10px 40px rgba(0,0,0,.4)}
    h1{font-size:1.25rem;margin:0 0 1rem}
    label{display:block;margin:.75rem 0 .25rem;font-size:.9rem}
    input{width:100%;padding:.6rem;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;box-sizing:border-box}
    button{margin-top:1.25rem;width:100%;padding:.7rem;border:0;border-radius:8px;background:#3b82f6;color:#fff;font-weight:600;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:1rem;font-size:.9rem;min-height:1.2rem}
    .ok{color:#4ade80}.err{color:#f87171}
    small{color:#94a3b8}
  </style>
</head>
<body>
  <div class="card">
    <h1>Restablecer contraseña</h1>
    <p><small>Solo para usuarios con rol (adminTI, coordinador, docente).</small></p>
    <label for="pass">Nueva contraseña</label>
    <input type="password" id="pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    <label for="pass2">Confirmar contraseña</label>
    <input type="password" id="pass2" placeholder="Repite la contraseña" autocomplete="new-password">
    <button id="btn">Actualizar contraseña</button>
    <div class="msg" id="msg"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token') || '';
    const correo = params.get('correo') || '';
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    if (!token || !correo) {
      msg.className = 'msg err';
      msg.textContent = 'Enlace inválido o incompleto.';
      btn.disabled = true;
    }
    btn.addEventListener('click', async () => {
      const p1 = document.getElementById('pass').value;
      const p2 = document.getElementById('pass2').value;
      msg.className = 'msg';
      msg.textContent = '';
      if (p1.length < 8) { msg.className='msg err'; msg.textContent='La contraseña debe tener al menos 8 caracteres.'; return; }
      if (p1 !== p2) { msg.className='msg err'; msg.textContent='Las contraseñas no coinciden.'; return; }
      btn.disabled = true;
      try {
        const res = await fetch('/api/auth/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ correo, token, password_nueva: p1 })
        });
        const data = await res.json();
        if (res.ok) {
          msg.className = 'msg ok';
          msg.textContent = 'Contraseña actualizada. Ya puedes iniciar sesión.';
          setTimeout(() => location.href = '/admin-login.html', 2500);
        } else {
          msg.className = 'msg err';
          msg.textContent = data.error || 'No se pudo actualizar.';
          btn.disabled = false;
        }
      } catch (e) {
        msg.className = 'msg err';
        msg.textContent = 'Error de conexión.';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
