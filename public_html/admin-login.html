<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi@Tech - Administration Login</title>
    <link rel="stylesheet" href="./css/admin-login.css">
</head>
<body>
    <div class="admin-login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <h1>🔐 Mi@Tech Administration</h1>
                <p class="subtitle">5.0 - Management Portal</p>
            </div>

            <!-- Formulario -->
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="correo">User name</label>
                    <input
                        type="email"                        
                        id="correo"
                        name="correo"
                        placeholder="admin@..."
                        required
                        autocomplete="email"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                    />
                </div>

                <button type="submit" class="btn-login" id="loginBtn">LOGIN</button>
            </form>

            <!-- Forgot password link -->
            <div id="forgotLinkWrap" style="text-align: center; margin-top: 14px;">
                <a href="#" id="forgotLink" style="font-size: 13px; color: #2563eb; text-decoration: none;">Forgot your password?</a>
            </div>

            <!-- Recovery form (hidden by default) -->
            <form id="recoveryForm" style="display: none; margin-top: 8px;">
                <div class="form-group">
                    <label for="recoveryEmail">Enter your account email</label>
                    <input
                        type="email"
                        id="recoveryEmail"
                        name="recoveryEmail"
                        placeholder="admin@..."
                        autocomplete="email"
                    />
                </div>
                <button type="submit" class="btn-login" id="recoveryBtn">Send temporary password</button>
                <div style="text-align: center; margin-top: 12px;">
                    <a href="#" id="backToLogin" style="font-size: 13px; color: #6b7280; text-decoration: none;">← Back to login</a>
                </div>
            </form>

            <!-- Recovery message -->
            <div id="recoveryMessage" style="display: none; margin-top: 12px; padding: 10px; border-radius: 6px; font-size: 13px; text-align: center;"></div>

            <!-- Mensaje de error -->
            <div id="errorMessage" class="error-message" style="display: none;"></div>

            <!-- Spinner de carga -->
            <div id="loadingSpinner" class="spinner" style="display: none;">
                <div class="spinner-circle"></div>
                <p>Verifying credentials...</p>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>Roles: TI, Coordinador, Docente</p>
                <p><a href="/">← Back to Student Portal</a></p>
                <p style="margin-top: 16px; font-size: 11px; color: #9ca3af;">
                    Mi@Tech v5.0 © 2026 Instituto Tecnológico Superior Japón
                </p>
            </div>
        </div>
    </div>

    <script src="./js/admin-login.js"></script>
</body>
</html>
